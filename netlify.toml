# ── Netlify build konfiguráció ──────────────────────────────────────────────
# A frontend mappa buildel, a distje kerül publikálásra.
# A backend külön Railway-en fut (nem itt).

[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

